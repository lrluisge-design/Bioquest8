<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioQuest 8° - Juego de Biologia Celular</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #6C63FF;
    --secondary: #FF6B6B;
    --accent: #4ECDC4;
    --yellow: #FFE66D;
    --green: #2ECC71;
    --orange: #F39C12;
    --dark: #2D3436;
    --light: #F8F9FA;
    --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg-gradient);
    min-height: 100vh;
    color: var(--dark);
    overflow-x: hidden;
  }

  .app {
    max-width: 900px;
    margin: 0 auto;
    padding: 10px;
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .header {
    text-align: center;
    padding: 20px 10px;
    color: white;
  }
  .header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
    margin-bottom: 5px;
  }
  .header p {
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    opacity: 0.9;
  }

  /* ===== SCORE BAR ===== */
  .score-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 10px 0;
    flex-wrap: wrap;
  }
  .score-item {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    padding: 8px 20px;
    border-radius: 30px;
    color: white;
    font-weight: 700;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ===== CARDS / PANELS ===== */
  .card {
    background: white;
    border-radius: 20px;
    padding: 25px;
    margin: 15px 0;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    animation: slideUp 0.4s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== MAIN MENU ===== */
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-top: 20px;
  }
  .menu-card {
    background: white;
    border-radius: 20px;
    padding: 25px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    border: 3px solid transparent;
  }
  .menu-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
  }
  .menu-card.mode1 { border-color: var(--primary); }
  .menu-card.mode1:hover { background: #f0efff; }
  .menu-card.mode2 { border-color: var(--accent); }
  .menu-card.mode2:hover { background: #e8faf8; }
  .menu-card.mode3 { border-color: var(--orange); }
  .menu-card.mode3:hover { background: #fef5e7; }
  .menu-card.mode4 { border-color: var(--secondary); }
  .menu-card.mode4:hover { background: #ffe8e8; }
  .menu-icon { font-size: 3rem; margin-bottom: 10px; }
  .menu-card h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    margin-bottom: 8px;
  }
  .menu-card p { font-size: 0.85rem; color: #666; }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-block;
    padding: 12px 30px;
    border: none;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
  }
  .btn:hover { transform: scale(1.05); }
  .btn:active { transform: scale(0.95); }
  .btn-primary { background: var(--primary); color: white; }
  .btn-secondary { background: var(--secondary); color: white; }
  .btn-accent { background: var(--accent); color: white; }
  .btn-green { background: var(--green); color: white; }
  .btn-orange { background: var(--orange); color: white; }
  .btn-back {
    background: rgba(255,255,255,0.2);
    color: white;
    margin-bottom: 10px;
    padding: 8px 20px;
    font-size: 0.9rem;
  }
  .btn-back:hover { background: rgba(255,255,255,0.35); }

  /* ===== TRIVIA ===== */
  .trivia-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .question-counter {
    font-weight: 800;
    color: var(--primary);
    font-size: 1rem;
  }
  .timer {
    background: var(--secondary);
    color: white;
    padding: 5px 15px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 1.1rem;
    min-width: 50px;
    text-align: center;
  }
  .timer.warning { animation: pulse 0.5s infinite; background: #e74c3c; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

  .question-text {
    font-size: clamp(1rem, 3vw, 1.2rem);
    font-weight: 700;
    margin-bottom: 20px;
    line-height: 1.5;
    color: var(--dark);
  }
  .topic-tag {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 15px;
    font-size: 0.75rem;
    font-weight: 700;
    margin-bottom: 10px;
    color: white;
  }
  .tag-organelos { background: var(--accent); }
  .tag-ciclo { background: var(--orange); }
  .tag-cancer { background: var(--secondary); }

  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    width: 100%;
    padding: 15px 20px;
    border: 3px solid #e0e0e0;
    border-radius: 15px;
    background: white;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: left;
    line-height: 1.4;
  }
  .option-btn:hover:not(.disabled) {
    border-color: var(--primary);
    background: #f0efff;
    transform: translateX(5px);
  }
  .option-btn.correct {
    border-color: var(--green);
    background: #d5f5e3;
    color: #1a7a3a;
  }
  .option-btn.incorrect {
    border-color: var(--secondary);
    background: #ffe8e8;
    color: #c0392b;
  }
  .option-btn.disabled { pointer-events: none; opacity: 0.7; }

  .feedback {
    margin-top: 15px;
    padding: 15px;
    border-radius: 15px;
    font-weight: 700;
    text-align: center;
    animation: slideUp 0.3s ease;
  }
  .feedback.correct { background: #d5f5e3; color: #1a7a3a; }
  .feedback.incorrect { background: #ffe8e8; color: #c0392b; }
  .feedback p { margin-bottom: 5px; }
  .feedback .explanation {
    font-weight: 400;
    font-size: 0.9rem;
    margin-top: 8px;
  }

  .progress-bar {
    width: 100%;
    height: 8px;
    background: #e0e0e0;
    border-radius: 10px;
    margin-bottom: 15px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    transition: width 0.5s ease;
  }

  /* ===== ORGANELLE MATCH ===== */
  .match-container { display: flex; flex-direction: column; gap: 15px; }
  .match-instruction {
    text-align: center;
    font-weight: 700;
    color: var(--primary);
    font-size: 1.05rem;
    margin-bottom: 5px;
  }
  .match-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 500px) {
    .match-grid { grid-template-columns: 1fr; }
  }
  .match-item {
    padding: 12px 15px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
    line-height: 1.3;
    user-select: none;
  }
  .match-organelle {
    background: #e8f4fd;
    border: 2px solid #3498db;
    color: #2c3e50;
  }
  .match-organelle.selected {
    background: #3498db;
    color: white;
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(52,152,219,0.4);
  }
  .match-function {
    background: #fef9e7;
    border: 2px solid #f1c40f;
    color: #2c3e50;
  }
  .match-function.selected {
    background: #f1c40f;
    color: white;
    transform: scale(1.05);
  }
  .match-item.matched {
    background: #d5f5e3 !important;
    border-color: var(--green) !important;
    color: #1a7a3a !important;
    pointer-events: none;
    opacity: 0.8;
  }
  .match-item.wrong {
    animation: shake 0.4s ease;
    border-color: var(--secondary) !important;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* ===== CYCLE SORT ===== */
  .cycle-phases {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin: 15px 0;
  }
  .phase-slot {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 15px;
    background: #f8f9fa;
    border: 2px dashed #ccc;
    border-radius: 12px;
    min-height: 50px;
    transition: all 0.3s ease;
  }
  .phase-slot.filled {
    border-style: solid;
    border-color: var(--primary);
    background: #f0efff;
  }
  .phase-slot.correct-slot {
    border-color: var(--green);
    background: #d5f5e3;
  }
  .phase-slot.wrong-slot {
    border-color: var(--secondary);
    background: #ffe8e8;
  }
  .slot-number {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 0.85rem;
    flex-shrink: 0;
  }
  .phase-options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 15px 0;
    justify-content: center;
  }
  .phase-chip {
    padding: 10px 18px;
    border-radius: 25px;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.3s ease;
    border: 2px solid;
    user-select: none;
  }
  .phase-chip.available {
    background: white;
    border-color: var(--orange);
    color: var(--orange);
  }
  .phase-chip.available:hover {
    background: var(--orange);
    color: white;
  }
  .phase-chip.placed {
    opacity: 0.3;
    pointer-events: none;
  }

  /* ===== CANCER MODE ===== */
  .cancer-scenario {
    background: linear-gradient(135deg, #fff5f5, #ffe8e8);
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 15px;
    border-left: 5px solid var(--secondary);
  }
  .cancer-scenario h3 {
    color: var(--secondary);
    margin-bottom: 8px;
    font-size: 1.1rem;
  }
  .cancer-scenario p {
    font-size: 0.95rem;
    line-height: 1.5;
  }
  .cancer-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 15px;
  }
  @media (max-width: 500px) {
    .cancer-options { grid-template-columns: 1fr; }
  }
  .cancer-opt {
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    background: white;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.9rem;
    transition: all 0.3s ease;
    text-align: center;
    font-family: 'Nunito', sans-serif;
  }
  .cancer-opt:hover:not(.disabled) {
    border-color: var(--secondary);
    background: #fff5f5;
  }
  .cancer-opt.correct { background: #d5f5e3; border-color: var(--green); color: #1a7a3a; }
  .cancer-opt.incorrect { background: #ffe8e8; border-color: var(--secondary); color: #c0392b; }

  /* ===== RESULTS ===== */
  .results-card {
    text-align: center;
    padding: 30px 20px;
  }
  .results-icon { font-size: 4rem; margin-bottom: 15px; }
  .results-score {
    font-family: 'Fredoka One', cursive;
    font-size: 2.5rem;
    color: var(--primary);
    margin-bottom: 5px;
  }
  .results-msg {
    font-size: 1.1rem;
    color: #666;
    margin-bottom: 20px;
  }
  .results-stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px 0;
    flex-wrap: wrap;
  }
  .stat-box {
    background: #f8f9fa;
    padding: 15px 20px;
    border-radius: 15px;
    min-width: 100px;
  }
  .stat-box .num {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    color: var(--primary);
  }
  .stat-box .label { font-size: 0.8rem; color: #888; }

  .btn-group {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 15px;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .app { padding: 5px; }
    .card { padding: 18px; margin: 10px 0; border-radius: 15px; }
    .menu-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .menu-card { padding: 18px 12px; }
    .menu-icon { font-size: 2.2rem; }
  }

  /* ===== CONFETTI ===== */
  .confetti-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 999;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    top: -20px;
    animation: confettiFall 3s ease-in forwards;
  }
  @keyframes confettiFall {
    0% { top: -20px; opacity: 1; transform: rotate(0deg) translateX(0); }
    100% { top: 110vh; opacity: 0; transform: rotate(720deg) translateX(100px); }
  }

  .selected-char {
    border-color: var(--primary) !important;
    background: #f0efff !important;
    box-shadow: 0 0 0 3px rgba(108,99,255,0.2);
  }

  .hidden { display: none !important; }

  /* ===== CELL DIAGRAM FOR MATCH MODE ===== */
  .cell-visual {
    text-align: center;
    margin: 10px 0;
    font-size: 0.85rem;
    color: #888;
    font-style: italic;
  }

  .round-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--primary);
    color: white;
    padding: 4px 14px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 0.85rem;
  }

  /* ===== REGISTER & REPORT STYLES ===== */
  .register-card {
    max-width: 500px;
    margin: 20px auto;
    text-align: center;
  }

  .report-card {
    background: white;
    border-radius: 15px;
    padding: 18px;
    margin-bottom: 12px;
    border-left: 5px solid;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  }

  .rubric-level {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 15px;
    border-radius: 10px;
    margin-bottom: 8px;
    font-weight: 700;
  }

  .rubric-bar {
    background: #f0f0f0;
    border-radius: 10px;
    height: 12px;
    overflow: hidden;
    margin: 8px 0;
  }

  .rubric-bar-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 1s ease;
  }

  .level-inicial { background: #e74c3c; color: white; }
  .level-basico { background: #f39c12; color: white; }
  .level-aceptable { background: #27ae60; color: white; }
  .level-sobresaliente { background: #2ecc71; color: white; }

  .student-badge {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    padding: 8px 20px;
    border-radius: 30px;
    color: white;
    font-weight: 700;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .report-btn {
    font-size: 1.1rem;
    padding: 14px 35px;
    animation: pulse 1.5s infinite;
  }

  .mode-check {
    display: inline-block;
    background: var(--green);
    color: white;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    text-align: center;
    line-height: 24px;
    font-weight: 700;
    font-size: 0.85rem;
    position: absolute;
    top: 10px;
    right: 10px;
  }

  @media print {
    body { background: white !important; }
    .btn, .btn-back { display: none !important; }
    .app { max-width: 100%; }
    .card { box-shadow: none; border: 1px solid #ddd; }
  }

</style>
</head>
<body>

<div class="app" id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" async></script>
<script>
// ========== GAME DATA ==========
const triviaQuestions = [
  // ORGANELOS
  {
    topic: "organelos",
    question: "La membrana plasmatica esta compuesta principalmente por fosfolipidos y proteinas. Su modelo se conoce como:",
    options: ["Mosaico fluido", "Doble helice", "Cadena continua", "Barrera rigida"],
    correct: 0,
    explanation: "El modelo de mosaico fluido describe la membrana como una estructura dinamica de fosfolipidos con proteinas incrustadas."
  },
  {
    topic: "organelos",
    question: "Cual es la funcion principal de la mitocondria?",
    options: ["Sintesis de proteinas", "Produccion de ATP (energia)", "Digestion celular", "Almacenamiento de agua"],
    correct: 1,
    explanation: "Las mitocondrias son las 'centrales energeticas' de la celula, produciendo ATP mediante respiracion celular."
  },
  {
    topic: "organelos",
    question: "Los ribosomas son los encargados de:",
    options: ["La digestion celular", "La sintesis de proteinas", "El almacenamiento de nutrientes", "La fotosintesis"],
    correct: 1,
    explanation: "Los ribosomas traducen el codigo genetico del ARN mensajero para sintetizar proteinas."
  },
  {
    topic: "organelos",
    question: "El aparato de Golgi funciona como:",
    options: ["Central energetica", "Centro de almacenamiento de ADN", "Central de distribucion, clasificando y empaquetando proteinas", "Barrera selectiva"],
    correct: 2,
    explanation: "El aparato de Golgi modifica, clasifica y empaqueta proteinas y lipidos para su secrecion o uso interno."
  },
  {
    topic: "organelos",
    question: "Los lisosomas se conocen como los 'digestores' de la celula porque:",
    options: ["Producen energia", "Contienen enzimas que descomponen desechos y material intracelular", "Sintetizan proteinas", "Realizan fotosintesis"],
    correct: 1,
    explanation: "Los lisosomas contienen enzimas digestivas que degradan desechos, material danado y particulas externas."
  },
  {
    topic: "organelos",
    question: "Los cloroplastos se encuentran exclusivamente en:",
    options: ["Celulas animales", "Celulas vegetales", "Bacterias", "Hongos"],
    correct: 1,
    explanation: "Los cloroplastos son exclusivos de celulas vegetales y son la sede de la fotosintesis."
  },
  {
    topic: "organelos",
    question: "La pared celular se diferencia de la membrana plasmatica en que:",
    options: ["Es semipermeable", "Es rigida y esta compuesta por celulosa", "Solo esta en celulas animales", "Es fluida"],
    correct: 1,
    explanation: "La pared celular es una estructura rigida de celulosa que da soporte y proteccion a las celulas vegetales."
  },
  {
    topic: "organelos",
    question: "El reticulo endoplasmatico rugoso se diferencia del liso porque:",
    options: ["No tiene membranas", "Tiene ribosomas adheridos a su superficie", "Produce lipidos solamente", "Esta fuera de la celula"],
    correct: 1,
    explanation: "El RE rugoso tiene ribosomas en su superficie, lo que le permite participar en la sintesis de proteinas."
  },
  {
    topic: "organelos",
    question: "Las vacuolas son de gran tamano en las celulas vegetales y su funcion principal es:",
    options: ["Producir energia", "Almacenar agua, nutrientes y desechos", "Sintetizar ADN", "Formar el huso mitotico"],
    correct: 1,
    explanation: "Las vacuolas almacenan agua, nutrientes y desechos, y mantienen la turgencia celular en plantas."
  },
  {
    topic: "organelos",
    question: "El centrosoma (con sus centriolos) es esencial para:",
    options: ["La fotosintesis", "La division celular, formando el huso mitotico", "La digestion de proteinas", "El transporte de lipidos"],
    correct: 1,
    explanation: "Los centriolos organizan los microtubulos y forman el huso mitotico durante la division celular."
  },
  {
    topic: "organelos",
    question: "La membrana plasmatica es semipermeable, lo que significa que:",
    options: ["No deja pasar nada", "Permite el paso de todas las sustancias", "Selecciona que sustancias pueden atravesarla", "Solo deja pasar agua"],
    correct: 2,
    explanation: "La membrana semipermeable permite el paso selectivo de sustancias segun su composicion quimica y tamano."
  },
  {
    topic: "organelos",
    question: "En la enfermedad de fibrosis quistica, el problema esta en:",
    options: ["Las mitocondrias", "Un canal de cloro en la membrana plasmatica", "Los ribosomas", "El nucleo celular"],
    correct: 1,
    explanation: "La fibrosis quistica es causada por la mutacion del gen CFTR que afecta un canal de cloro en la membrana."
  },

  // CICLO CELULAR
  {
    topic: "ciclo",
    question: "El ciclo celular se divide en dos grandes fases:",

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function checkDateAccess() {
  if (!ACCESS_CONFIG.enabled) return { valid: true };
  const today = new Date();
  const start = new Date(ACCESS_CONFIG.startDate + 'T00:00:00');
  const end = new Date(ACCESS_CONFIG.endDate + 'T23:59:59');

  if (today < start) {
    const diff = Math.ceil((start - today) / (1000 * 60 * 60 * 24));
    return { valid: false, msg: 'El juego estara disponible a partir del ' + start.toLocaleDateString('es-CR', {day:'numeric',month:'long',year:'numeric'}) + '. Faltan ' + diff + ' dia(s).' };
  }
  if (today > end) {
    return { valid: false, msg: 'El periodo de acceso finalizo el ' + end.toLocaleDateString('es-CR', {day:'numeric',month:'long',year:'numeric'}) + '. Contacta a tu profesor.' };
  }
  return { valid: true };
}

function verifyAccessCode() {
  const input = document.getElementById('accessCode');
  const error = document.getElementById('accessError');
  if (!input) return;

  const code = input.value.trim().toLowerCase();
  if (code === ACCESS_CONFIG.code.toLowerCase()) {
    state.screen = 'register';
    render();
  } else {
    error.textContent = code ? '❌ Codigo incorrecto. Intenta de nuevo.' : 'Ingresa el codigo de acceso.';
    error.style.display = 'block';
    input.style.borderColor = 'var(--secondary)';
    input.value = '';
    input.focus();
  }
}

function render() {
  const app = document.getElementById('app');
  switch(state.screen) {
    case 'access': app.innerHTML = renderAccessGate(); break;
    case 'register': app.innerHTML = renderRegister(); break;
    case 'menu': app.innerHTML = renderMenu(); break;
    case 'trivia': app.innerHTML = renderTrivia(); break;
    case 'match': app.innerHTML = renderMatch(); break;
    case 'cycle':
      state._showingCycleFinalResults = false;
      state._showingCyclePhase1Results = false;
      app.innerHTML = renderCycle();
      if (state._showingCycleFinalResults) startResultsTimer();
      if (state._showingCyclePhase1Results) startCyclePhaseTimer();
      break;
    case 'cancer': app.innerHTML = renderCancer(); break;
    case 'results': app.innerHTML = renderResults(); startResultsTimer(); break;
    case 'transition': app.innerHTML = renderTransition(); break;
    case 'report': app.innerHTML = renderReport(); startAutoSend(); break;
  }
}

function registerStudent() {
  const nombre = (document.getElementById('regNombre')?.value || '').trim();
  const apellido1 = (document.getElementById('regApellido1')?.value || '').trim();
  const apellido2 = (document.getElementById('regApellido2')?.value || '').trim();
  const seccion = (document.getElementById('regSeccion')?.value || '').trim();
  const telEst = (document.getElementById('regTelEstudiante')?.value || '').trim();
  const telEnc = (document.getElementById('regTelEncargado')?.value || '').trim();
  const errDiv = document.getElementById('regError');

  // Validate required fields
  const missing = [];
  if (!nombre) missing.push('nombre');
  if (!apellido1) missing.push('primer apellido');
  if (!apellido2) missing.push('segundo apellido');
  if (!seccion) missing.push('seccion');

  if (missing.length > 0) {
    if (errDiv) { errDiv.style.display = 'block'; errDiv.textContent = 'Falta: ' + missing.join(', '); }
    if (!nombre) document.getElementById('regNombre').style.borderColor = 'var(--secondary)';
    if (!apellido1) document.getElementById('regApellido1').style.borderColor = 'var(--secondary)';
    if (!apellido2) document.getElementById('regApellido2').style.borderColor = 'var(--secondary)';
    if (!seccion) document.getElementById('regSeccion').style.borderColor = 'var(--secondary)';
    return;
  }

  state.studentNombre = nombre;
  state.studentApellido1 = apellido1;
  state.studentApellido2 = apellido2;
  state.studentSeccion = seccion;
  state.studentTelEst = telEst;
  state.studentTelEnc = telEnc;
  state.studentName = apellido1 + ' ' + apellido2 + ' ' + nombre;
  // Reset all tracking
  state.totalScore = 0;
  state.triviaScore = 0; state.matchScore = 0; state.cycleScore = 0; state.cancerScore = 0;
  state.modesCompleted = { trivia: false, match: false, cycle: false, cancer: false };
  state.topicStats = {
    organelos: { correct: 0, total: 0 },
    ciclo: { correct: 0, total: 0 },
    cancer: { correct: 0, total: 0 }
  };
  state.currentModeIndex = 0;
  showTransition();
}

function launchCurrentMode() {

    case 'match': startMatch(); break;
    case 'cycle': startCycle(); break;

// ========== TRIVIA ==========
function startTrivia() {
  const shuffled = shuffleArray(triviaQuestions);
  state.triviaQuestions = shuffled.slice(0, 15);
  state.currentQuestion = 0;
  state.triviaCorrect = 0;
  state.triviaScore = 0;
  state.answered = false;
  state.screen = 'trivia';
  state.timer = 25;
  render();
  startTimer();
}

function startTimer() {
  clearInterval(state.timerInterval);
  state.timer = 25;
  state.timerInterval = setInterval(() => {
    state.timer--;
    const timerEl = document.querySelector('.timer');
    if (timerEl) {
      timerEl.textContent = state.timer;
      if (state.timer <= 5) timerEl.classList.add('warning');
    }
    if (state.timer <= 0) {
      clearInterval(state.timerInterval);
      if (!state.answered) {
        // Track timeout as unanswered attempt
        const q = state.triviaQuestions[state.currentQuestion];
        if (q) {
          state.topicStats[q.topic].total++;
        }
        state.answered = true;
        render();
        // Auto-advance after showing timeout feedback
        setTimeout(() => {
          if (state.screen === 'trivia') {
            nextQuestion();
          }
        }, 3000);
      }
    }
  }, 1000);
}

function renderTrivia() {
  const q = state.triviaQuestions[state.currentQuestion];
  if (!q) return renderTriviaResults();

  const topicLabels = { organelos: 'Organelos', ciclo: 'Ciclo Celular', cancer: 'Cancer' };
  const topicClasses = { organelos: 'tag-organelos', ciclo: 'tag-ciclo', cancer: 'tag-cancer' };
  const progress = ((state.currentQuestion) / state.triviaQuestions.length) * 100;

  let feedbackHTML = '';
  if (state.answered) {
    const isCorrect = document.querySelector('.option-btn.correct') !== null;
    const wasTimedOut = state.timer <= 0;
    if (wasTimedOut && !document.querySelector('.option-btn.correct')) {
      feedbackHTML = `
        <div class="feedback incorrect">
          <p>⏰ Se acabo el tiempo!</p>
          <p class="explanation">La respuesta correcta era: <strong>${q.options[q.correct]}</strong></p>
          <p class="explanation">${q.explanation}</p>
        </div>`;
    }
  }

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;color:white;font-size:0.85rem;flex-wrap:wrap;gap:5px;">
      <span style="font-weight:700;">👤 ${state.studentName}</span>
      <span style="background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:15px;">Modo ${state.currentModeIndex + 1}/4</span>
    </div>
    <div class="card">
      <div class="progress-bar">
        <div class="progress-fill" style="width: ${progress}%"></div>
      </div>
      <div class="trivia-header">
        <span class="question-counter">Pregunta ${state.currentQuestion + 1} / ${state.triviaQuestions.length}</span>
        <span class="round-badge">⭐ ${state.triviaScore} pts</span>
        <span class="timer ${state.timer <= 5 ? 'warning' : ''}">${state.timer}</span>
      </div>
      <span class="topic-tag ${topicClasses[q.topic]}">${topicLabels[q.topic]}</span>
      <div class="question-text">${q.question}</div>
      <div class="options-list">
        ${q.options.map((opt, i) => `
          <button class="option-btn ${state.answered ? (i === q.correct ? 'correct' : 'disabled') : ''}"
            onclick="answerTrivia(${i})" ${state.answered ? 'disabled' : ''}>
            ${String.fromCharCode(65 + i)}) ${opt}
          </button>
        `).join('')}
      </div>
      ${feedbackHTML}
      ${state.answered ? `
        <div style="text-align:center;margin-top:15px;color:#888;font-size:0.85rem;">
          ⏳ Siguiente pregunta en un momento...
        </div>
      ` : ''}
    </div>
  `;
}

function answerTrivia(idx) {
  if (state.answered) return;
  state.answered = true;
  clearInterval(state.timerInterval);

  const q = state.triviaQuestions[state.currentQuestion];
  const isCorrect = idx === q.correct;

  // Track per-topic
  const topic = q.topic;
  state.topicStats[topic].total++;
  if (isCorrect) {
    state.topicStats[topic].correct++;
  }

  if (isCorrect) {
    const points = Math.max(10, 10 + state.timer);
    state.triviaScore += points;
    state.totalScore += points;
    state.triviaCorrect++;
  }

  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === q.correct) btn.classList.add('correct');
    else if (i === idx && !isCorrect) btn.classList.add('incorrect');
  });

  const optionsList = document.querySelector('.options-list');
  const feedback = document.createElement('div');
  feedback.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
  feedback.innerHTML = `
    <p>${isCorrect ? '🎉 Correcto! +' + Math.max(10, 10 + state.timer) + ' pts' : '❌ Incorrecto'}</p>
    <p class="explanation">${q.explanation}</p>
  `;
  optionsList.after(feedback);

  // Auto-advance after 3 seconds for reading feedback
  setTimeout(() => {
    if (state.screen === 'trivia') {
      nextQuestion();
    }
  }, 3000);
}

function nextQuestion() {
  state.currentQuestion++;
  state.answered = false;
  if (state.currentQuestion >= state.triviaQuestions.length) {
    state.modesCompleted.trivia = true;
    state.screen = 'results';
    state.resultMode = 'trivia';
    render();
  } else {
    render();
    startTimer();
  }
}

// ========== MATCH ==========
function startMatch() {
  state.matchRound = 0;
  state.matchScore = 0;
  state.matchCorrect = 0;
  state.matchAttempts = 0;
  state._pairAttempts = 0;
  state.matchTimer = 60;
  state.selectedOrganelle = null;
  state.selectedFunction = null;
  state.matchedPairs = [];
  state.screen = 'match';
  render();
  startMatchTimer();
}

function startMatchTimer() {
  clearInterval(state.matchTimerInterval);
  state.matchTimer = 60;
  state.matchTimerInterval = setInterval(() => {
    state.matchTimer--;
    const timerEl = document.getElementById('matchTimerDisplay');
    if (timerEl) {
      timerEl.textContent = state.matchTimer;
      if (state.matchTimer <= 10) timerEl.classList.add('warning');
      else timerEl.classList.remove('warning');
    }
    if (state.matchTimer <= 0) {
      clearInterval(state.matchTimerInterval);
      autoMatchTimeout();
    }
  }, 1000);
}

function autoMatchTimeout() {
  // Count remaining unmatched pairs as incorrect
  const round = organelleMatchData[state.matchRound];
  if (round) {
    const remaining = round.pairs.length - state.matchedPairs.length;
    state.topicStats.organelos.total += remaining;
  }

  // Move to next round or finish
  state.matchRound++;
  state.matchedPairs = [];
  state._shuffledFuncs = null;
  state._pairAttempts = 0;
  state.selectedOrganelle = null;
  state.selectedFunction = null;

  if (state.matchRound >= organelleMatchData.length) {
    state.modesCompleted.match = true;
    state.resultMode = 'match';
    state.screen = 'results';
    render();
  } else {
    render();
    startMatchTimer();
  }
}

function renderMatch() {
  if (state.matchRound >= organelleMatchData.length) {
    state.modesCompleted.match = true;
    state.resultMode = 'match';
    state.screen = 'results';
    return renderResults();
  }

  const round = organelleMatchData[state.matchRound];
  const shuffledFuncs = state._shuffledFuncs || shuffleArray(round.pairs.map(p => p.func));
  if (!state._shuffledFuncs) state._shuffledFuncs = shuffledFuncs;

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;color:white;font-size:0.85rem;flex-wrap:wrap;gap:5px;">
      <span style="font-weight:700;">👤 ${state.studentName}</span>
      <span style="background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:15px;">Modo ${state.currentModeIndex + 1}/4</span>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px;">
        <span class="round-badge">Ronda ${state.matchRound + 1} / ${organelleMatchData.length}</span>
        <span class="round-badge" style="background:var(--accent)">⭐ ${state.matchScore} pts</span>
        <span class="timer ${state.matchTimer <= 10 ? 'warning' : ''}" id="matchTimerDisplay">${state.matchTimer}</span>
      </div>
      <div class="match-instruction">🧩 ${round.title}</div>
      <p style="text-align:center;font-size:0.9rem;color:#888;margin-bottom:15px;">Selecciona un organelo y luego su funcion correspondiente</p>
      <div class="match-grid">
        <div>
          <div style="text-align:center;font-weight:700;color:#3498db;margin-bottom:8px;">🔬 Organelos</div>
          ${round.pairs.map((p, i) => `
            <div class="match-item match-organelle ${state.selectedOrganelle === i ? 'selected' : ''} ${state.matchedPairs.includes(i) ? 'matched' : ''}"
              onclick="selectOrganelle(${i})" style="margin-bottom:8px;">
              ${p.emoji} ${p.organelle}
            </div>
          `).join('')}
        </div>
        <div>
          <div style="text-align:center;font-weight:700;color:#f1c40f;margin-bottom:8px;">⚙️ Funciones</div>
          ${shuffledFuncs.map((f, i) => {
            const origIdx = round.pairs.findIndex(p => p.func === f);
            return `
              <div class="match-item match-function ${state.selectedFunction === i ? 'selected' : ''} ${state.matchedPairs.includes(origIdx) ? 'matched' : ''}"
                onclick="selectFunction(${i})" style="margin-bottom:8px;">
                ${f}
              </div>`;
          }).join('')}
        </div>
      </div>
    </div>
  `;
}

function selectOrganelle(idx) {
  if (state.matchedPairs.includes(idx)) return;
  state.selectedOrganelle = idx;
  if (state.selectedFunction !== null) checkMatch();
  else render();
}

function selectFunction(idx) {
  const round = organelleMatchData[state.matchRound];
  const funcText = state._shuffledFuncs[idx];
  const origIdx = round.pairs.findIndex(p => p.func === funcText);
  if (state.matchedPairs.includes(origIdx)) return;
  state.selectedFunction = idx;
  if (state.selectedOrganelle !== null) checkMatch();
  else render();
}

function checkMatch() {
  const round = organelleMatchData[state.matchRound];
  const funcText = state._shuffledFuncs[state.selectedFunction];
  const correctFunc = round.pairs[state.selectedOrganelle].func;

  state.matchAttempts++;

  if (funcText === correctFunc) {
    // Track organelos topic
    state.topicStats.organelos.correct++;
    state.topicStats.organelos.total++;

    state.matchedPairs.push(state.selectedOrganelle);
    state.matchCorrect++;
    // Graduated scoring: 1st try = 15pts, 2nd = 10pts, 3rd+ = 5pts
    const pairAttempts = (state._pairAttempts || 0);
    const points = pairAttempts === 0 ? 15 : pairAttempts === 1 ? 10 : 5;
    state._pairAttempts = 0;
    state.matchScore += points;
    state.totalScore += points;
    state.selectedOrganelle = null;
    state.selectedFunction = null;

    if (state.matchedPairs.length === round.pairs.length) {
      clearInterval(state.matchTimerInterval);
      setTimeout(() => {
        state.matchRound++;
        state.matchedPairs = [];
        state._shuffledFuncs = null;
        state._pairAttempts = 0;
        render();
        if (state.matchRound < organelleMatchData.length) {
          startMatchTimer();
        }
      }, 800);
    }
    render();
  } else {
    // Track incorrect organelos attempt
    state.topicStats.organelos.total++;
    state._pairAttempts = (state._pairAttempts || 0) + 1;

    render();
    setTimeout(() => {
      const items = document.querySelectorAll('.match-item.selected');
      items.forEach(el => { el.classList.add('wrong'); el.classList.remove('selected'); });
      setTimeout(() => {
        state.selectedOrganelle = null;
        state.selectedFunction = null;
        render();
      }, 500);
    }, 100);
  }
}

// ========== CYCLE SORT ==========
function startCycle() {
  state.placedPhases = new Array(8).fill(null);
  state.availablePhases = shuffleArray([...Array(8).keys()]);
  state.cycleChecked = false;
  state.cycleScore = 0;
  state.cyclePhase2 = false; // false = Fase 1 (ordenar), true = Fase 2 (caracteristicas)
  state.cyclePhase1Score = 0;
  state.cyclePhase2Score = 0;
  // Phase 2 state
  state.charCurrentQ = 0;
  state.charQuestions = [];
  state.charAnswered = false;
  state.charCorrect = 0;
  state.screen = 'cycle';
  render();
}

function renderCycle() {
  if (state.cyclePhase2) return renderCyclePhase2();
  if (state.cycleChecked) return renderCyclePhase1Results();

  const placedCount = state.placedPhases.filter(p => p !== null).length;

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;color:white;font-size:0.85rem;flex-wrap:wrap;gap:5px;">
      <span style="font-weight:700;">👤 ${state.studentName}</span>
      <span style="background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:15px;">Modo ${state.currentModeIndex + 1}/4</span>
    </div>
    <div class="card">
      <div style="text-align:center;margin-bottom:15px;">
        <span class="round-badge" style="background:var(--orange);">FASE 1 de 2</span>
        <h2 style="font-family:'Fredoka One',cursive;color:var(--orange);margin-top:10px;">🔄 Ordena el Ciclo Celular</h2>
        <p style="color:#888;font-size:0.9rem;margin-top:5px;">Coloca las 8 fases en el orden correcto (desde G1 hasta Citocinesis)</p>
      </div>

      <div style="text-align:center;margin-bottom:15px;font-weight:700;color:var(--orange);">
        Fases disponibles - toca una para colocarla:
      </div>
      <div class="phase-options">
        ${state.availablePhases.map(idx => {
          const isPlaced = state.placedPhases.includes(idx);
          return `<div class="phase-chip ${isPlaced ? 'placed' : 'available'}"
            onclick="placePhase(${idx})">${cyclePhases[idx].name}</div>`;
        }).join('')}
      </div>

      <div style="margin:15px 0;padding:10px;background:#f8f9fa;border-radius:12px;">
        <div style="font-weight:700;text-align:center;margin-bottom:10px;color:var(--dark);">Orden del ciclo celular:</div>
        <div class="cycle-phases">
          ${state.placedPhases.map((phaseIdx, slotIdx) => `
            <div class="phase-slot ${phaseIdx !== null ? 'filled' : ''}" onclick="removePhase(${slotIdx})">
              <div class="slot-number">${slotIdx + 1}</div>
              <span style="font-weight:600;font-size:0.95rem;">
                ${phaseIdx !== null ? cyclePhases[phaseIdx].name : '(vacio - toca una fase arriba)'}
              </span>
              ${phaseIdx !== null ? '<span style="margin-left:auto;font-size:0.8rem;color:#999;">✕ quitar</span>' : ''}
            </div>
          `).join('')}
        </div>
      </div>

      <div style="text-align:center;">
        ${placedCount === 8 ? `<button class="btn btn-green" onclick="checkCycle()">Verificar Orden ✓</button>` :
          `<p style="color:#888;font-size:0.9rem;">Coloca las ${8 - placedCount} fases restantes</p>`}
      </div>
    </div>
  `;
}

function placePhase(phaseIdx) {
  if (state.placedPhases.includes(phaseIdx)) return;
  const emptySlot = state.placedPhases.indexOf(null);
  if (emptySlot === -1) return;
  state.placedPhases[emptySlot] = phaseIdx;
  render();
}

function removePhase(slotIdx) {
  if (state.placedPhases[slotIdx] === null) return;
  state.placedPhases[slotIdx] = null;
  const filled = state.placedPhases.filter(p => p !== null);
  state.placedPhases = [...filled, ...new Array(8 - filled.length).fill(null)];
  render();
}

function checkCycle() {
  state.cycleChecked = true;
  let correct = 0;
  state.placedPhases.forEach((phaseIdx, slotIdx) => {
    state.topicStats.ciclo.total++;
    if (phaseIdx === slotIdx) {
      correct++;
      state.topicStats.ciclo.correct++;
    }
  });
  state.cyclePhase1Score = correct * 15;
  render();
}

function renderCyclePhase1Results() {
  state._showingCyclePhase1Results = true;
  let correct = 0;
  state.placedPhases.forEach((phaseIdx, slotIdx) => {
    if (phaseIdx === slotIdx) correct++;
  });

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;color:white;font-size:0.85rem;flex-wrap:wrap;gap:5px;">
      <span style="font-weight:700;">👤 ${state.studentName}</span>
      <span style="background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:15px;">Modo ${state.currentModeIndex + 1}/4</span>
    </div>
    <div class="card">
      <div style="text-align:center;margin-bottom:15px;">
        <span class="round-badge" style="background:var(--green);">FASE 1 - Completada</span>
        <h2 style="font-family:'Fredoka One',cursive;color:var(--orange);margin-top:10px;">🔄 Resultado: Orden del Ciclo</h2>
        <p style="font-size:1.2rem;font-weight:700;color:var(--primary);margin:10px 0;">${correct} / 8 correctas = ${state.cyclePhase1Score} pts</p>
      </div>
      <div class="cycle-phases">
        ${state.placedPhases.map((phaseIdx, slotIdx) => {
          const isCorrect = phaseIdx === slotIdx;
          return `
            <div class="phase-slot ${isCorrect ? 'correct-slot' : 'wrong-slot'}">
              <div class="slot-number" style="background:${isCorrect ? 'var(--green)' : 'var(--secondary)'}">${slotIdx + 1}</div>
              <div>
                <div style="font-weight:700;font-size:0.95rem;">
                  ${isCorrect ? '✅' : '❌'} Tu respuesta: ${cyclePhases[phaseIdx].name}
                </div>
                ${!isCorrect ? `<div style="font-size:0.85rem;color:var(--green);font-weight:600;">Correcta: ${cyclePhases[slotIdx].name}</div>` : ''}
                <div style="font-size:0.8rem;color:#888;margin-top:3px;">${cyclePhases[slotIdx].desc}</div>
              </div>
            </div>`;
        }).join('')}
      </div>
      <div style="text-align:center;margin-top:20px;padding:15px;background:linear-gradient(135deg,#fff3e0,#ffe0b2);border-radius:15px;">
        <p style="font-weight:700;color:var(--orange);font-size:1.1rem;">🧬 Ahora viene la Fase 2!</p>
        <p style="color:#666;font-size:0.9rem;margin:8px 0;">Relaciona cada fase del ciclo con sus 2 caracteristicas principales</p>
        <div style="margin:8px 0;font-size:0.85rem;color:#555;">
          ⏱️ Comienza automaticamente en <span id="cyclePhaseCountdown" style="font-weight:800;color:var(--orange);font-size:1rem;">15</span> segundos...
        </div>
        <button class="btn btn-orange" onclick="launchCyclePhase2()" style="margin-top:10px;">Continuar a Fase 2 →</button>
      </div>
    </div>
  `;
}

let cyclePhaseTimerInterval = null;

function startCyclePhaseTimer() {
  clearInterval(cyclePhaseTimerInterval);
  let countdown = 15;
  cyclePhaseTimerInterval = setInterval(() => {
    countdown--;
    const el = document.getElementById('cyclePhaseCountdown');
    if (el) {
      el.textContent = countdown;
      if (countdown <= 5) el.style.color = '#e74c3c';
    }
    if (countdown <= 0) {
      clearInterval(cyclePhaseTimerInterval);
      cyclePhaseTimerInterval = null;
      startCyclePhase2();
    }
  }, 1000);
}

function launchCyclePhase2() {
  clearInterval(cyclePhaseTimerInterval);
  cyclePhaseTimerInterval = null;
  startCyclePhase2();
}

// ========== CYCLE PHASE 2: Match characteristics ==========
function startCyclePhase2() {
  state.cyclePhase2 = true;
  state.charCorrect = 0;
  state.charCurrentQ = 0;
  state.charAnswered = false;
  state.cyclePhase2Score = 0;
  state.charTimer = 30;
  clearInterval(state.charTimerInterval);

  // Generate 8 questions, one per phase
  // Each question shows a phase name and 4 characteristic options (2 correct, 2 distractors)
  const questions = [];
  const allChars = cyclePhases.flatMap((p, i) => p.chars.map(c => ({ text: c, phaseIdx: i })));

  cyclePhases.forEach((phase, idx) => {
    // Get the 2 correct characteristics
    const correctChars = phase.chars;
    // Get 2 distractors from other phases
    const otherChars = allChars.filter(c => c.phaseIdx !== idx);
    const shuffledOthers = shuffleArray(otherChars);
    const distractors = shuffledOthers.slice(0, 2).map(c => c.text);

    // Build 4 options
    const options = shuffleArray([
      { text: correctChars[0], correct: true },
      { text: correctChars[1], correct: true },
      { text: distractors[0], correct: false },
      { text: distractors[1], correct: false },
    ]);

    questions.push({
      phaseName: phase.name,
      phaseColor: phase.color,
      phaseDesc: phase.desc,
      options: options,
    });
  });

  state.charQuestions = shuffleArray(questions);
  render();
  startCharTimer();
}

function startCharTimer() {
  clearInterval(state.charTimerInterval);
  state.charTimer = 30;
  state.charTimerInterval = setInterval(() => {
    state.charTimer--;
    const timerEl = document.getElementById('charTimerDisplay');
    if (timerEl) {
      timerEl.textContent = state.charTimer;
      if (state.charTimer <= 5) timerEl.classList.add('warning');
      else timerEl.classList.remove('warning');
    }
    if (state.charTimer <= 0) {
      clearInterval(state.charTimerInterval);
      if (!state.charAnswered) {
        // Time's up - auto-check with whatever is selected (or nothing)
        autoCheckCharTimeout();
      }
    }
  }, 1000);
}

function autoCheckCharTimeout() {
  state.charAnswered = true;
  const allBtns = document.querySelectorAll('.char-opt');
  let correctCount = 0;

  allBtns.forEach(btn => {
    btn.style.pointerEvents = 'none';
    const isCorrect = btn.dataset.correct === 'true';
    const isSelected = btn.classList.contains('selected-char');

    if (isCorrect) {
      btn.style.borderColor = 'var(--green)';
      btn.style.background = '#d5f5e3';
      btn.style.color = '#1a7a3a';
    }
    if (isSelected && !isCorrect) {
      btn.style.borderColor = 'var(--secondary)';
      btn.style.background = '#ffe8e8';
      btn.style.color = '#c0392b';
    }
    if (isSelected && isCorrect) correctCount++;
  });

  state.topicStats.ciclo.total += 2;
  state.topicStats.ciclo.correct += correctCount;

  const points = correctCount * 10;
  state.cyclePhase2Score += points;
  state.charCorrect += correctCount;

  const fbDiv = document.getElementById('char-feedback');
  const q = state.charQuestions[state.charCurrentQ];
  const checkBtn = document.getElementById('charCheckBtn');
  if (checkBtn) checkBtn.style.display = 'none';
  const hint = document.getElementById('charHint');
  if (hint) hint.style.display = 'none';

  fbDiv.innerHTML = `
    <div class="feedback incorrect" style="margin-top:15px;">
      <p>⏰ Se acabo el tiempo! ${correctCount > 0 ? '+' + points + ' pts' : 'Sin puntos'}</p>
      <p class="explanation" style="margin-top:8px;">Las 2 caracteristicas de <strong>${q.phaseName}</strong> son:</p>
      <p class="explanation">✅ ${q.options.find(o => o.correct).text}</p>
      <p class="explanation">✅ ${q.options.filter(o => o.correct)[1].text}</p>
    </div>
    <div style="text-align:center;margin-top:15px;color:#888;font-size:0.85rem;">
      ⏳ Siguiente en un momento...
    </div>
  `;

  setTimeout(() => { nextCharQuestion(); }, 3000);
}

function renderCyclePhase2() {
  if (state.charCurrentQ >= state.charQuestions.length) {
    return renderCycleFinalResults();
  }

  const q = state.charQuestions[state.charCurrentQ];
  const progress = (state.charCurrentQ / state.charQuestions.length) * 100;

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;color:white;font-size:0.85rem;flex-wrap:wrap;gap:5px;">
      <span style="font-weight:700;">👤 ${state.studentName}</span>
      <span style="background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:15px;">Modo ${state.currentModeIndex + 1}/4</span>
    </div>
    <div class="card">
      <div class="progress-bar">
        <div class="progress-fill" style="width:${progress}%;background:linear-gradient(90deg,var(--orange),#e67e22);"></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px;">
        <span class="round-badge" style="background:var(--orange);">FASE 2 - Pregunta ${state.charCurrentQ + 1}/${state.charQuestions.length}</span>
        <span class="round-badge">⭐ ${state.cyclePhase1Score + state.cyclePhase2Score} pts</span>
        <span class="timer ${state.charTimer <= 5 ? 'warning' : ''}" id="charTimerDisplay">${state.charTimer}</span>
      </div>

      <div style="text-align:center;margin-bottom:15px;">
        <div style="display:inline-block;padding:10px 25px;background:${q.phaseColor};color:white;border-radius:15px;font-family:'Fredoka One',cursive;font-size:1.3rem;">
          🔬 ${q.phaseName}
        </div>
      </div>

      <div class="question-text" style="text-align:center;font-size:1rem;">
        Selecciona las <strong>2 caracteristicas</strong> que corresponden a esta fase:
      </div>

      <div style="display:flex;flex-direction:column;gap:10px;margin-top:15px;">
        ${q.options.map((opt, i) => `
          <button class="option-btn char-opt" data-idx="${i}" data-correct="${opt.correct}"
            onclick="toggleCharOption(this, ${i})"
            style="border-width:3px;${state.charAnswered ? 'pointer-events:none;' : ''}">
            ${opt.text}
          </button>
        `).join('')}
      </div>

      ${!state.charAnswered ? `
        <div style="text-align:center;margin-top:15px;">
          <button class="btn btn-green" id="charCheckBtn" onclick="checkCharAnswer()" style="display:none;">Verificar Seleccion ✓</button>
          <p id="charHint" style="color:#888;font-size:0.85rem;">Selecciona exactamente 2 opciones</p>
        </div>
      ` : ''}
      <div id="char-feedback"></div>
    </div>
  `;
}

function toggleCharOption(el, idx) {
  if (state.charAnswered) return;

  el.classList.toggle('selected-char');

  // Apply styles
  if (el.classList.contains('selected-char')) {
    el.style.borderColor = 'var(--primary)';
    el.style.background = '#f0efff';
  } else {
    el.style.borderColor = '#e0e0e0';
    el.style.background = 'white';
  }

  // Count selected
  const selected = document.querySelectorAll('.char-opt.selected-char');
  const checkBtn = document.getElementById('charCheckBtn');
  const hint = document.getElementById('charHint');

  if (selected.length === 2) {
    if (checkBtn) checkBtn.style.display = 'inline-block';
    if (hint) hint.style.display = 'none';
  } else {
    if (checkBtn) checkBtn.style.display = 'none';
    if (hint) { hint.style.display = 'block'; hint.textContent = `Selecciona ${2 - selected.length} opcion(es) mas`; }
  }
}

function checkCharAnswer() {
  state.charAnswered = true;
  clearInterval(state.charTimerInterval);
  const selected = document.querySelectorAll('.char-opt.selected-char');
  const allBtns = document.querySelectorAll('.char-opt');
  let correctCount = 0;

  allBtns.forEach(btn => {
    btn.style.pointerEvents = 'none';
    const isCorrect = btn.dataset.correct === 'true';
    const isSelected = btn.classList.contains('selected-char');

    if (isCorrect) {
      btn.style.borderColor = 'var(--green)';
      btn.style.background = '#d5f5e3';
      btn.style.color = '#1a7a3a';
    }
    if (isSelected && !isCorrect) {
      btn.style.borderColor = 'var(--secondary)';
      btn.style.background = '#ffe8e8';
      btn.style.color = '#c0392b';
    }
    if (isSelected && isCorrect) {
      correctCount++;
    }
  });

  // Track ciclo phase 2 answers
  state.topicStats.ciclo.total += 2; // 2 options to get right
  state.topicStats.ciclo.correct += correctCount;

  const points = correctCount * 10;
  state.cyclePhase2Score += points;
  state.charCorrect += correctCount;

  const fbDiv = document.getElementById('char-feedback');
  const q = state.charQuestions[state.charCurrentQ];
  const isAllCorrect = correctCount === 2;

  const checkBtn = document.getElementById('charCheckBtn');
  if (checkBtn) checkBtn.style.display = 'none';
  const hint = document.getElementById('charHint');
  if (hint) hint.style.display = 'none';

  fbDiv.innerHTML = `
    <div class="feedback ${isAllCorrect ? 'correct' : 'incorrect'}" style="margin-top:15px;">
      <p>${isAllCorrect ? '🎉 Perfecto! Ambas correctas! +20 pts' : correctCount === 1 ? '🤔 Acertaste 1 de 2. +10 pts' : '❌ Ninguna fue correcta'}</p>
      <p class="explanation" style="margin-top:8px;">Las 2 caracteristicas de <strong>${q.phaseName}</strong> son:</p>
      <p class="explanation">✅ ${q.options.find(o => o.correct).text}</p>
      <p class="explanation">✅ ${q.options.filter(o => o.correct)[1].text}</p>
    </div>
    <div style="text-align:center;margin-top:15px;color:#888;font-size:0.85rem;">
      ⏳ Siguiente en un momento...
    </div>
  `;

  // Auto-advance after 3 seconds for reading feedback
  setTimeout(() => {
    nextCharQuestion();
  }, 3000);
}

function nextCharQuestion() {
  state.charCurrentQ++;
  state.charAnswered = false;
  clearInterval(state.charTimerInterval);
  render();
  if (state.charCurrentQ < state.charQuestions.length) {
    startCharTimer();
  }
}

function renderCycleFinalResults() {
  state.modesCompleted.cycle = true;
  state._showingCycleFinalResults = true;
  state.cycleScore = state.cyclePhase1Score + state.cyclePhase2Score;
  state.totalScore += state.cycleScore;

  let phase1Correct = 0;
  state.placedPhases.forEach((phaseIdx, slotIdx) => {
    if (phaseIdx === slotIdx) phase1Correct++;
  });

  const totalPossible = (8 * 15) + (8 * 20); // 120 + 160 = 280
  const pct = Math.round((state.cycleScore / totalPossible) * 100);

  let msg;
  if (pct >= 90) msg = '🌟 Dominas el ciclo celular como un biologo!';
  else if (pct >= 70) msg = '👏 Muy buen conocimiento del ciclo celular!';
  else if (pct >= 50) msg = '💪 Buen intento! Repasa las fases y sus detalles.';
  else msg = '📚 Necesitas estudiar mas el ciclo celular. Tu puedes!';

  showConfetti();

  const nextModeInfo = state.currentModeIndex < modeSequence.length - 1 ? modeSequence[state.currentModeIndex + 1] : null;

  return `
    <div class="card results-card">
      <div class="results-icon">🔄</div>
      <h2 style="font-family:'Fredoka One',cursive;margin-bottom:5px;">Ciclo Celular - Resultado Final</h2>
      <div class="results-score">${state.cycleScore} pts</div>
      <div class="results-msg">${msg}</div>

function startCancer() {
  state.cancerScenarios = shuffleArray(cancerScenarios).slice(0, 6);
  state.currentScenario = 0;
  state.cancerCorrect = 0;
  state.cancerScore = 0;
  state.cancerAnswered = false;
  state.cancerTimer = 30;
  state.screen = 'cancer';
  render();
  startCancerTimer();
}

function startCancerTimer() {
  clearInterval(state.cancerTimerInterval);
  state.cancerTimer = 30;
  state.cancerTimerInterval = setInterval(() => {
    state.cancerTimer--;
    const timerEl = document.getElementById('cancerTimerDisplay');
    if (timerEl) {
      timerEl.textContent = state.cancerTimer;
      if (state.cancerTimer <= 5) timerEl.classList.add('warning');
      else timerEl.classList.remove('warning');
    }
    if (state.cancerTimer <= 0) {
      clearInterval(state.cancerTimerInterval);
      if (!state.cancerAnswered) {
        autoCancerTimeout();
      }
    }
  }, 1000);
}

function autoCancerTimeout() {
  state.cancerAnswered = true;
  const s = state.cancerScenarios[state.currentScenario];

  state.topicStats.cancer.total++;

  const buttons = document.querySelectorAll('.cancer-opt');
  buttons.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === s.correct) btn.classList.add('correct');
  });

  const fbDiv = document.getElementById('cancer-feedback');
  fbDiv.innerHTML = `
    <div class="feedback incorrect" style="margin-top:15px;">
      <p>⏰ Se acabo el tiempo!</p>
      <p class="explanation">${s.explanation}</p>
    </div>
    <div style="text-align:center;margin-top:15px;color:#888;font-size:0.85rem;">
      ⏳ Siguiente en un momento...
    </div>
  `;

  setTimeout(() => { nextScenario(); }, 3000);
}

  if (state.currentScenario >= state.cancerScenarios.length) {

  const s = state.cancerScenarios[state.currentScenario];

function answerCancer(idx) {
  if (state.cancerAnswered) return;
  state.cancerAnswered = true;
  clearInterval(state.cancerTimerInterval);

  const s = state.cancerScenarios[state.currentScenario];
  const isCorrect = idx === s.correct;

  // Track cancer topic
  state.topicStats.cancer.total++;
  if (isCorrect) {
    state.topicStats.cancer.correct++;
  }

  if (isCorrect) {
    state.cancerCorrect++;
    state.cancerScore += 20;
    state.totalScore += 20;
  }

  const buttons = document.querySelectorAll('.cancer-opt');
  buttons.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === s.correct) btn.classList.add('correct');
    else if (i === idx && !isCorrect) btn.classList.add('incorrect');
  });

  const fbDiv = document.getElementById('cancer-feedback');
  fbDiv.innerHTML = `
    <div class="feedback ${isCorrect ? 'correct' : 'incorrect'}" style="margin-top:15px;">
      <p>${isCorrect ? '🎉 Excelente detective! +20 pts' : '❌ No exactamente...'}</p>
      <p class="explanation">${s.explanation}</p>
    </div>
    <div style="text-align:center;margin-top:15px;color:#888;font-size:0.85rem;">
      ⏳ Siguiente en un momento...
    </div>
  `;

  // Auto-advance after 3 seconds
  setTimeout(() => { nextScenario(); }, 3000);
}

function nextScenario() {
  state.currentScenario++;
  state.cancerAnswered = false;
  clearInterval(state.cancerTimerInterval);
  if (state.currentScenario >= state.cancerScenarios.length) {
    state.modesCompleted.cancer = true;
    state.resultMode = 'cancer';
    state.screen = 'results';
  }
  render();
  if (state.screen === 'cancer') {
    startCancerTimer();
  }
}

// Basado en: Rubrica integrada para la triada (MEP 2026)
// Escala: 1. Inicial, 2. Basico, 3. Aceptable, 4. Sobresaliente

function getRubricLevel(percentage) {
  if (percentage >= 76) return { level: 4, name: 'Sobresaliente', color: '#2ecc71', icon: '🌟' };
  if (percentage >= 51) return { level: 3, name: 'Aceptable', color: '#3498db', icon: '👏' };
  if (percentage >= 26) return { level: 2, name: 'Basico', color: '#f39c12', icon: '📖' };
  return { level: 1, name: 'Inicial', color: '#e74c3c', icon: '🔰' };
}

// Descriptores oficiales MEP 2026 - Rubrica integrada para la triada
const saberDescriptors = {
  saberConocer: {
    4: 'Explica con precision, usa vocabulario tecnico y relaciones causales y sistemicas.',
    3: 'Explica adecuadamente con pocos detalles faltantes; usa terminos basicos correctamente.',
    2: 'Explica parcialmente; presenta errores o confusiones conceptuales.',
    1: 'No logra explicar el fenomeno o mantiene ideas previas no revisadas.'
  },
  saberHacer: {

    3: 'Ejecuta procedimientos correctos; organiza y representa datos; usa fuentes pertinentes.',
    2: 'Requiere guia frecuente; registros incompletos o poco precisos.',
    1: 'No sigue procedimientos; no registra informacion util.'
  },
  saberSer: {
    4: 'Argumenta con evidencia, coopera activamente, respeta diversidad de ideas, propone mejoras.',
    3: 'Participa y argumenta de forma simple; respeta normas y roles.',
    2: 'Participacion limitada; bajo compromiso colaborativo.',
    1: 'Dificultad para colaborar; no respeta acuerdos; evita participar.'
  }
};

function calculate3Saberes() {
  // SABER = Trivia (pure knowledge recall)
  const triviaTopics = state.topicStats;
  let saberCorrect = 0, saberTotal = 0;
  // Only count trivia questions (organelos/ciclo/cancer from trivia)
  // We track trivia separately
  if (state.triviaQuestions && state.triviaQuestions.length > 0) {
    saberTotal = state.triviaQuestions.length;
    saberCorrect = state.triviaCorrect;
  }
  const saberPct = saberTotal > 0 ? Math.round((saberCorrect / saberTotal) * 100) : 0;

  // SABER HACER = Match + Cycle (application: classifying, ordering, relating)
  const matchTotal = organelleMatchData.reduce((sum, r) => sum + r.pairs.length, 0);
  const matchCorrect = state.matchCorrect;
  // Cycle: phase1 order (8 positions) + phase2 characteristics (16 options)
  let cyclePhase1Correct = 0;
  if (state.placedPhases) {
    state.placedPhases.forEach((phaseIdx, slotIdx) => {
      if (phaseIdx === slotIdx) cyclePhase1Correct++;
    });
  }
  const hacerCorrect = matchCorrect + cyclePhase1Correct + state.charCorrect;
  const hacerTotal = matchTotal + 8 + 16; // match pairs + 8 order positions + 16 char options
  const hacerPct = hacerTotal > 0 ? Math.round((hacerCorrect / hacerTotal) * 100) : 0;

  // SABER SER = Cancer Detective (social awareness, prevention, responsibility)
  const serTotal = state.cancerScenarios ? state.cancerScenarios.length : 6;
  const serCorrect = state.cancerCorrect;
  const serPct = serTotal > 0 ? Math.round((serCorrect / serTotal) * 100) : 0;

  return {
    saberConocer: { pct: saberPct, correct: saberCorrect, total: saberTotal, rubric: getRubricLevel(saberPct) },
    saberHacer: { pct: hacerPct, correct: hacerCorrect, total: hacerTotal, rubric: getRubricLevel(hacerPct) },
    saberSer: { pct: serPct, correct: serCorrect, total: serTotal, rubric: getRubricLevel(serPct) }
  };
}

function calculateCotidianoGrade(saberes) {
  // Ponderacion: SABER CONOCER 40%, SABER HACER 40%, SABER SER 20%
  const grade = (saberes.saberConocer.pct * 0.4) + (saberes.saberHacer.pct * 0.4) + (saberes.saberSer.pct * 0.2);
  return Math.round(grade);
}

let autoSendInterval = null;
let alreadySent = false;

function startAutoSend() {
  if (alreadySent) return;
  let countdown = 10;
  clearInterval(autoSendInterval);
  autoSendInterval = setInterval(() => {
    countdown--;
    const el = document.getElementById('autoSendCountdown');
    if (el) el.textContent = countdown;
    if (countdown <= 0) {
      clearInterval(autoSendInterval);
      sendToGoogleSheets();
    }
  }, 1000);
}

function sendToGoogleSheets() {
  clearInterval(autoSendInterval);
  if (alreadySent) {
    alert('Los resultados ya fueron enviados al profesor.');
    return;
  }
  alreadySent = true;
  if (!GOOGLE_FORM_CONFIG.formId) {
    alert('Google Sheets no esta configurado todavia. Contacte al profesor.');
    return;
  }

  const saberes = calculate3Saberes();
  const cotidiano = calculateCotidianoGrade(saberes);
  const fecha = new Date().toLocaleDateString('es-CR');
  const e = GOOGLE_FORM_CONFIG.entries;

  const formData = new URLSearchParams();
  formData.append(e.seccion, state.studentSeccion);
  formData.append(e.apellido1, state.studentApellido1);
  formData.append(e.apellido2, state.studentApellido2);
  formData.append(e.nombre, state.studentNombre);
  formData.append(e.telEstudiante, state.studentTelEst || '');
  formData.append(e.telEncargado, state.studentTelEnc || '');
  formData.append(e.fecha, fecha);
  formData.append(e.saberConocerNivel, saberes.saberConocer.rubric.level);
  formData.append(e.saberConocerPct, saberes.saberConocer.pct);
  formData.append(e.saberHacerNivel, saberes.saberHacer.rubric.level);
  formData.append(e.saberHacerPct, saberes.saberHacer.pct);
  formData.append(e.saberSerNivel, saberes.saberSer.rubric.level);
  formData.append(e.saberSerPct, saberes.saberSer.pct);
  formData.append(e.cotidiano, cotidiano.toFixed(1));
  formData.append(e.puntaje, state.totalScore);

  // Build pre-filled Google Form URL and auto-submit
  const baseUrl = 'https://docs.google.com/forms/d/e/' + GOOGLE_FORM_CONFIG.formId + '/formResponse?';
  const params = formData.toString();
  const fullUrl = baseUrl + params + '&submit=Submit';

  // Open in new tab - Google will process the submission
  const submitWindow = window.open(fullUrl, '_blank');

  // Update UI to show sent status
  const notice = document.getElementById('autoSendNotice');
  if (notice) {
    notice.style.background = '#e8f5e9';
    notice.style.borderColor = '#4caf50';
    notice.innerHTML = '<p style="font-weight:700;color:#2e7d32;font-size:0.9rem;">✅ Resultados enviados al profesor exitosamente!</p>';
  }
  const btnManual = document.getElementById('btnSendManual');
  if (btnManual) {
    btnManual.textContent = '✅ Enviado';
    btnManual.style.background = '#aaa';
    btnManual.style.cursor = 'default';
  }

  if (!submitWindow) {
    alert('El navegador bloqueo la ventana. Permite ventanas emergentes e intenta de nuevo.');
    alreadySent = false;
  }
}

  state.studentApellido2 = '';

  state.studentTelEnc = '';
  state.studentSeccion = '';
  state.totalScore = 0;
  state.currentModeIndex = 0;
  state.triviaScore = 0; state.matchScore = 0; state.cycleScore = 0; state.cancerScore = 0;
